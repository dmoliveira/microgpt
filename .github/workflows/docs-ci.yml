name: Docs CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prettier check
        run: npx --yes prettier --check "README.md" "docs/**/*.html" "docs/**/*.css" "docs/**/*.js" ".lighthouserc*.json"

      - name: Docs integrity check
        run: python3 scripts/verify_docs.py

      - name: Lighthouse quality audit
        if: github.event_name == 'pull_request'
        run: npx --yes @lhci/cli@0.13.0 autorun --config=.lighthouserc.pr.json

      - name: Lighthouse quality audit (strict main)
        if: github.event_name == 'push'
        run: npx --yes @lhci/cli@0.13.0 autorun --config=.lighthouserc.main.json
